server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index husky.html;

    location = / {
        return 302 /husky.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # OnlyOffice callback endpoint — required for edit mode.
    # Accepts save requests and returns {"error":0}.
    location = /callback/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            return 204;
        }
        add_header Access-Control-Allow-Origin "*" always;
        add_header Content-Type "application/json" always;
        # Discard body; acknowledge save to keep editor in edit mode
        return 200 '{"error":0}';
    }

    # Guest uploads are session-scoped. The page deletes the uploaded source
    # after OnlyOffice has loaded it, and again when the browser session ends.
    location ^~ /uploads/ {
        root /usr/share/nginx/html;
        dav_methods PUT DELETE;
        create_full_put_path on;
        dav_access user:rw group:rw all:rw;
        client_max_body_size 100m;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Cache-Control "no-store" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Same-origin fallback for older pages; the new guest flow calls 8090.
    location /ds-api/ {
        proxy_pass http://onlyoffice:80/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # OnlyOffice internal paths (api.js loads sub-resources from /web-apps/ directly)
    location /web-apps/ {
        proxy_pass http://onlyoffice:80/web-apps/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # OnlyOffice returns document cache URLs at the Document Server root.
    location /cache/ {
        proxy_pass http://onlyoffice:80/cache/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
    gzip_min_length 512;

    # Proxy Cloudreve API to avoid CORS — used by custom login page
    location /api/cloudreve/ {
        proxy_pass http://cloudreve:5212/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Set-Cookie;
    }
}

server {
    listen 8090;
    server_name _;

    add_header Access-Control-Allow-Private-Network true always;
    add_header Access-Control-Allow-Origin "*" always;

    location / {
        proxy_pass http://onlyoffice:80/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

server {
    listen 8080;
    server_name _;

    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 9;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml application/font-woff application/font-woff2;
    gzip_vary on;
    gzip_proxied any;
    gzip_disable "msie6";

    location ~ ^/(husky-.*\.(svg|png|jpg|ico|webp))$ {
        root /usr/share/nginx/html;
        try_files /$1 =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ^~ /static/ {
        root /usr/share/nginx/html/cloudreve_static;
        try_files $uri @cloudreve_fallback;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://cloudreve:5212;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 500m;
        proxy_read_timeout 300s;

        if ($uri ~* "\.(js|css|woff2?|ttf|png|jpg|jpeg|svg|ico|webp)$") {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    location @cloudreve_fallback {
        proxy_pass http://cloudreve:5212;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 500m;
        proxy_read_timeout 300s;
    }
}
